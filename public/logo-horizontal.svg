<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" role="img" aria-label="American AI Solutions — Detroit-Built. AI-Powered.">
  <defs>
    <linearGradient id="bgH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1F5C"/>
      <stop offset="100%" style="stop-color:#1A3A8F"/>
    </linearGradient>
    <linearGradient id="aH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#C8D4F0"/>
    </linearGradient>
    <filter id="glowH">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="720" height="140" rx="16" fill="url(#bgH)"/>

  <!-- ICON (scaled down, left-aligned) -->
  <!-- A left leg -->
  <line x1="22" y1="124" x2="70" y2="20" stroke="url(#aH)" stroke-width="10" stroke-linecap="round"/>
  <!-- A right leg -->
  <line x1="70" y1="20" x2="118" y2="124" stroke="url(#aH)" stroke-width="10" stroke-linecap="round"/>
  <!-- A crossbar -->
  <line x1="40" y1="82" x2="100" y2="82" stroke="url(#aH)" stroke-width="7.5" stroke-linecap="round"/>
  <!-- Signal arc 1 -->
  <path d="M 55,15 Q 70,0 85,15" stroke="#00D4FF" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glowH)"/>
  <!-- Signal arc 2 -->
  <path d="M 44,8 Q 70,-10 96,8" stroke="#00D4FF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.65" filter="url(#glowH)"/>
  <!-- Signal arc 3 -->
  <path d="M 33,1 Q 70,-22 107,1" stroke="#00D4FF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.38"/>
  <!-- Gold apex -->
  <circle cx="70" cy="20" r="5.5" fill="#FFD700" filter="url(#glowH)"/>
  <circle cx="70" cy="20" r="3" fill="#FFF8DC"/>

  <!-- Divider line -->
  <line x1="142" y1="24" x2="142" y2="116" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- WORDMARK -->
  <!-- AMERICAN -->
  <text x="162" y="52" font-family="'DM Sans', 'Arial', sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="5">AMERICAN</text>
  <!-- AI SOLUTIONS -->
  <text x="160" y="90" font-family="'DM Sans', 'Arial', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF" letter-spacing="2">AI SOLUTIONS</text>
  <!-- URL / tagline -->
  <text x="163" y="114" font-family="'DM Sans', 'Arial', sans-serif" font-size="11" font-weight="400" fill="#00D4FF" letter-spacing="1.5">americanaisolutionsllc.com</text>

  <!-- Right side accent: Detroit tag -->
  <rect x="556" y="50" width="140" height="40" rx="4" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="626" y="75" font-family="'DM Sans', 'Arial', sans-serif" font-size="11" font-weight="700" fill="#00D4FF" text-anchor="middle" letter-spacing="2">DETROIT-BUILT</text>
</svg>
