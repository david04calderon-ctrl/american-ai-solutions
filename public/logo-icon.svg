<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="American AI Solutions logo">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1F5C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A3A8F;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="aGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8D4F0;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="48" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="400" height="400" rx="48" fill="url(#grid)"/>

  <!-- THE "A" — left leg -->
  <line x1="62" y1="358" x2="200" y2="88" stroke="url(#aGrad)" stroke-width="30" stroke-linecap="round"/>
  <!-- THE "A" — right leg -->
  <line x1="200" y1="88" x2="338" y2="358" stroke="url(#aGrad)" stroke-width="30" stroke-linecap="round"/>
  <!-- THE "A" — crossbar -->
  <line x1="118" y1="248" x2="282" y2="248" stroke="url(#aGrad)" stroke-width="22" stroke-linecap="round"/>

  <!-- SIGNAL ARCS — radiating from the peak -->
  <!-- Arc 1: tightest -->
  <path d="M 163,76 Q 200,38 237,76" stroke="#00D4FF" stroke-width="11" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Arc 2: medium -->
  <path d="M 136,60 Q 200,8 264,60" stroke="#00D4FF" stroke-width="8.5" fill="none" stroke-linecap="round" opacity="0.72" filter="url(#glow)"/>
  <!-- Arc 3: widest -->
  <path d="M 108,44 Q 200,-22 292,44" stroke="#00D4FF" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.42" filter="url(#glow)"/>

  <!-- GOLD APEX DOT — the signal source -->
  <circle cx="200" cy="88" r="16" fill="#FFD700" filter="url(#goldGlow)"/>
  <circle cx="200" cy="88" r="9" fill="#FFF8DC"/>
</svg>
