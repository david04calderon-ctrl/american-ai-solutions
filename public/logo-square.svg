<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="American AI Solutions LLC">
  <title>AAIS</title>

  <!-- Square background -->
  <rect width="100" height="100" fill="#1A3A8F" rx="12"/>

  <!-- Three ascending bars (white) centered in square -->
  <rect x="18" y="55" width="14" height="30" rx="2" fill="white"/>
  <rect x="40" y="38" width="14" height="47" rx="2" fill="white"/>
  <rect x="62" y="18" width="14" height="67" rx="2" fill="white"/>

  <!-- Signal line across the tops -->
  <polyline points="25,55 47,38 69,18"
            stroke="#00D4FF" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none"/>

  <!-- Node dots -->
  <circle cx="25" cy="55" r="4" fill="#00D4FF"/>
  <circle cx="47" cy="38" r="4" fill="#00D4FF"/>
  <circle cx="69" cy="18" r="4" fill="#00D4FF"/>
</svg>
