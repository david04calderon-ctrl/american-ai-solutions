<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 88" width="340" height="88" role="img" aria-label="American AI Solutions LLC">
  <title>American AI Solutions LLC</title>

  <!-- Mark: three ascending industry bars — Detroit skyline meets AI signal -->
  <rect x="0"  y="46" width="11" height="34" rx="2" fill="#1A3A8F"/>
  <rect x="19" y="28" width="11" height="52" rx="2" fill="#1A3A8F"/>
  <rect x="38" y="8"  width="11" height="72" rx="2" fill="#1A3A8F"/>

  <!-- Signal line connecting bar tops — the AI layer -->
  <polyline points="5.5,46 24.5,28 43.5,8"
            stroke="#00D4FF" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none"/>

  <!-- Node dots at each bar apex -->
  <circle cx="5.5"  cy="46" r="3.5" fill="#00D4FF"/>
  <circle cx="24.5" cy="28" r="3.5" fill="#00D4FF"/>
  <circle cx="43.5" cy="8"  r="3.5" fill="#00D4FF"/>

  <!-- Wordmark — stacked two-line layout -->
  <text x="64" y="32"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="16" font-weight="700" fill="#0D1117"
        letter-spacing="3">AMERICAN AI</text>

  <text x="64" y="54"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="16" font-weight="700" fill="#1A3A8F"
        letter-spacing="3">SOLUTIONS</text>

  <!-- Sub-line -->
  <text x="64" y="70"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" font-weight="400" fill="#4A5473"
        letter-spacing="2.5">LLC  ·  DETROIT, MICHIGAN</text>

  <!-- Bottom rule — grounds the wordmark -->
  <line x1="64" y1="76" x2="340" y2="76" stroke="#1A3A8F" stroke-width="1.2"/>
</svg>
