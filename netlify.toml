[build]
  command = "npm run build"
  publish = "dist"

# Redirect /www to apex
[[redirects]]
  from = "https://www.americanaisolutionsllc.com/*"
  to = "https://americanaisolutionsllc.com/:splat"
  status = 301
  force = true

# Trailing slash normalization — canonical URLs without trailing slash redirect to with
[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/dashboard"
  to = "/dashboard/"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/privacy/"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/terms/"
  status = 301

[[redirects]]
  from = "/resources/michigan-ai-grant-guide"
  to = "/resources/michigan-ai-grant-guide/"
  status = 301

[[redirects]]
  from = "/thank-you"
  to = "/thank-you/"
  status = 301

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://fonts.googleapis.com https://calendly.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://calendly.com; frame-src https://calendly.com; upgrade-insecure-requests"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Service worker must not be cached
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
